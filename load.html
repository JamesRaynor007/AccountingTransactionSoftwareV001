<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Transaction Upload</title>

  <!-- Link aggressive CSS -->
  <link rel="stylesheet" href="Css/load.css" />

  <!-- Icon library -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

  <!-- Required scripts -->
  <script src="papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Transaction Upload</h1>
      <p>Import, export, download template, and upload transactions online</p>
    </header>

    <!-- Return button -->
    <button id="returnBtn" class="btn"><i class="fas fa-arrow-left"></i> Back</button>

    <!-- Controls -->
    <div class="controls">
      <input type="file" id="fileInput" accept=".csv,.xlsx" />
      <button id="importBtn" class="btn"><i class="fas fa-upload"></i> Import</button>
      <button id="exportBtn" class="btn"><i class="fas fa-download"></i> Export Consolidated</button>
      <button id="downloadTemplateBtn" class="btn"><i class="fas fa-file-download"></i> Download Template</button>
    </div>

    <!-- Filters -->
    <div class="filter-section">
      <h2>Filter Transactions</h2>
      <div class="filter-grid">
        <div>
          <label>Amount (e.g., 100 or 50-200):</label>
          <input type="text" id="filterAmount" class="filter-input" placeholder="Amount" />
        </div>
        <div>
          <label>Account:</label>
          <input type="text" id="filterAccount" class="filter-input" placeholder="Account" />
        </div>
        <div>
          <label>Date from:</label>
          <input type="date" id="filterDateFrom" class="filter-input" />
        </div>
        <div>
          <label>Date to:</label>
          <input type="date" id="filterDateTo" class="filter-input" />
        </div>
        <div>
          <label>ID:</label>
          <input type="text" id="filterId" class="filter-input" placeholder="ID" />
        </div>
        <div>
          <label>Description:</label>
          <input type="text" id="filterDescription" class="filter-input" placeholder="Description" />
        </div>
      </div>
      <div class="filter-actions">
        <button id="applyFilterBtn" class="btn"><i class="fas fa-filter"></i> Apply Filters</button>
        <button id="clearFilterBtn" class="btn"><i class="fas fa-trash-alt"></i> Clear Filters</button>
      </div>
    </div>

    <!-- Form -->
    <div class="form-section">
      <h2>Enter Transaction Manually</h2>
      <form id="transactionForm">
        <input type="text" id="id" placeholder="ID" required />
        <input type="date" id="date" required />
        <input type="text" id="account" placeholder="Account" required />
        <input type="text" id="description" placeholder="Description" required />
        <input type="number" step="0.01" id="amount" placeholder="Amount" required />
        <button type="submit" class="btn"><i class="fas fa-plus"></i> Add</button>
      </form>
    </div>

    <!-- Status and table -->
    <div id="status" class="status">Waiting for file or manual entry...</div>
    <div id="transactionsTable" class="kpi-grid"></div>
  </div>

  <!-- Main script -->
  <script src="Scripts/load.js"></script>
</body>
</html>
